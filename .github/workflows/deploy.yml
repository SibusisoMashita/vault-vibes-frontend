name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"

  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      id-token: write
      contents: read

    steps:

      # ─────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # Setup pnpm + Node
      # ─────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─────────────────────────────────────────────
      # Install dependencies
      # ─────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ─────────────────────────────────────────────
      # Build
      # ─────────────────────────────────────────────
      - name: Build frontend
        run: pnpm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}

      # ─────────────────────────────────────────────
      # Configure AWS credentials (OIDC)
      # ─────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: frontend-deploy-prod
          aws-region: us-east-1

      # ─────────────────────────────────────────────
      # Upload hashed assets (long cache)
      # Only uploads changed files
      # ─────────────────────────────────────────────
      - name: Upload static assets
        run: |
          aws s3 sync ./dist s3://vaultvibes-frontend \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      # ─────────────────────────────────────────────
      # Upload index.html with no cache
      # ─────────────────────────────────────────────
      - name: Upload index.html
        run: |
          aws s3 cp ./dist/index.html s3://vaultvibes-frontend/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # ─────────────────────────────────────────────
      # CloudFront invalidation uy
      # ─────────────────────────────────────────────
      - name: Invalidate CloudFront
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" \
            --query 'Invalidation.Id' \
            --output text)

          echo "INVALIDATION_ID=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "Created invalidation: $INVALIDATION_ID"

      # ─────────────────────────────────────────────
      # Wait until invalidation completes
      # ─────────────────────────────────────────────
      - name: Wait for CloudFront invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidate.outputs.INVALIDATION_ID }}

      # ─────────────────────────────────────────────
      # Verify deployment
      # ─────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "Deployment completed"
          echo "Frontend URL: https://${{ vars.CLOUDFRONT_DOMAIN_NAME }}"

          aws s3api head-object \
            --bucket vaultvibes-frontend \
            --key index.html \
            --query '{CacheControl: CacheControl, LastModified: LastModified}' \
            --output table