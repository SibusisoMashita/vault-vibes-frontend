name: Deploy Dev Frontend

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
  push:
    branches-ignore:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (dev)
        run: pnpm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.DEV_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.DEV_COGNITO_SPA_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.DEV_COGNITO_DOMAIN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: frontend-deploy-dev
          aws-region: us-east-1

      - name: Upload static assets (long cache)
        run: |
          aws s3 sync ./dist s3://${{ vars.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp ./dist/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" \
            --query 'Invalidation.Id' --output text)
          echo "INVALIDATION_ID=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "Created invalidation: $INVALIDATION_ID"

      - name: Wait for CloudFront invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidate.outputs.INVALIDATION_ID }}

      - name: Verify deployment
        run: |
          echo "DEV Frontend deployed: https://dev.vaultvibes.co.za"
          aws s3api head-object \
            --bucket ${{ vars.S3_BUCKET }} \
            --key index.html \
            --query '{CacheControl: CacheControl, LastModified: LastModified}' \
            --output table